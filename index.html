<script>
// ============================================================
// STATE — persiste no localStorage
// ============================================================
let notas = JSON.parse(localStorage.getItem('profit_notas') || '[]');
let barChart, doughnutChart, lineChart;
let currentPeriod = 'all';

async function saveToStorage() {
  localStorage.setItem('profit_notas', JSON.stringify(notas))
}

// ============================================================
// 🔧 FUNÇÕES GLOBAIS (CORREÇÃO DE ESCOPO)
// ============================================================
function mostrarApp(mostrar) {
  document.getElementById('loginScreen').style.display = mostrar ? 'none' : 'flex'
  document.querySelector('.topbar').style.display = mostrar ? '' : 'none'
  document.querySelector('.tabs').style.display = mostrar ? '' : 'none'
  document.querySelector('.main').style.display = mostrar ? '' : 'none'
}

async function carregarNotasSupabase() {
  const { data, error } = await _supabase
    .from('notas')
    .select('*')
    .order('data', { ascending: false })

  if (error) {
    console.error('Erro ao carregar do Supabase:', error)
    return
  }

  if (data && data.length > 0) {
    notas = data.map(n => ({
      id: n.id,
      data: n.data,
      numNota: n.num_nota,
      corretora: n.corretora,
      vendaDisp: n.venda_disp,
      compraDisp: n.compra_disp,
      vendaOpc: n.venda_opc,
      compraOpc: n.compra_opc,
      valorNegocios: n.valor_negocios,
      ajusteDT: n.ajuste_dt,
      ajustePosicao: n.ajuste_posicao,
      taxaCorMed: n.taxa_cor_med,
      taxaCor: n.taxa_cor,
      taxaReg: n.taxa_reg,
      taxasBMF: n.taxas_bmf,
      irrf: n.irrf,
      irrfDT: n.irrf_dt,
      iss: n.iss,
      outros: n.outros,
      outros2: n.outros2,
      irrfCorr: n.irrf_corr,
      totalDesp: n.total_desp,
      totalInvest: n.total_invest,
      totalNormal: n.total_normal,
      totalLiquido: n.total_liquido,
      totalLiquidoNota: n.total_liquido_nota,
      bruto: n.bruto,
      liquido: n.liquido,
      observacao: n.observacao
    }))

    localStorage.setItem('profit_notas', JSON.stringify(notas))
  }
}

// ============================================================
// SAVE NOTA
// ============================================================
async function saveNota() {
  const data = document.getElementById('fData').value;
  if (!data) { alert('Preencha a data do pregão.'); return; }

  const valNegBruto = n('fValorNegocios');
  const valNegSide  = document.getElementById('fValorNegociosSide')?.value || 'D';
  const valNegocios = valNegBruto * (valNegSide === 'D' ? -1 : 1) ||
    (n('fVendaDisp') + n('fVendaOpc') - n('fCompraDisp') - n('fCompraOpc'));

  if (valNegocios === 0) {
    alert('Preencha pelo menos o Valor dos Negócios.');
    return;
  }

  const taxaCorMed = n('fTaxaCorretoraMed'), taxaCor = n('fTaxaCorretora');
  const taxaReg    = n('fTaxaRegistro'),     taxasBMF = n('fTaxasBMF');
  const iss        = n('fISS'),              outros   = n('fOutros');
  const irrfDT     = n('fIRRFDT'),           irrfCorr = n('fIRRFCorr');
  const totalDesp  = n('fTotalDespesas');
  const ajusteDT   = n('fAjusteDT') * (document.getElementById('fAjusteDTSide').value === 'D' ? -1 : 1);
  const totalLiqSide = document.getElementById('fTotalLiquidoNotaSide')?.value || 'C';
  const liquido    = n('fTotalLiquidoNota') * (totalLiqSide === 'D' ? -1 : 1);
  const bruto      = Math.abs(valNegocios);

  const nota = {
    id: Date.now(),
    data,
    numNota: document.getElementById('fNumNota').value || '—',
    corretora: document.getElementById('fCorretora').value || '—',
    vendaDisp: n('fVendaDisp'),
    compraDisp: n('fCompraDisp'),
    vendaOpc: n('fVendaOpc'),
    compraOpc: n('fCompraOpc'),
    valorNegocios: valNegocios,
    ajusteDT,
    ajustePosicao: n('fAjustePosicao'),
    taxaCorMed,
    taxaCor,
    taxaReg,
    taxasBMF,
    irrf: n('fIRRF'),
    irrfDT,
    iss,
    outros,
    irrfCorr,
    outros2: n('fOutros2'),
    totalDesp,
    totalInvest: n('fTotalInvest'),
    totalNormal: n('fTotalNormal') * (document.getElementById('fTotalNormalSide').value === 'D' ? -1 : 1),
    totalLiquido: n('fTotalLiquido'),
    totalLiquidoNota: liquido,
    bruto,
    liquido,
    observacao: (document.getElementById('fObservacao').value || '').trim(),
  };

  notas.push(nota)
  saveToStorage()
  await saveNotaSupabase(nota)

  updatePeriodSelect()
  clearForm()
  renderDashboard()
  renderHistorico()
  switchTab('historico')

  showToast('Nota salva com sucesso!', 'success')
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  mostrarApp(false)

  _supabase.auth.onAuthStateChange(async (event, session) => {
    if (session) {
      mostrarApp(true)
      await carregarNotasSupabase()
      updatePeriodSelect()
      renderDashboard()
      renderHistorico()
    } else {
      mostrarApp(false)
      notas = []
    }
  })
})
</script>
